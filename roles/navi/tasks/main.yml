---
- block:
  - name: Install navi (via mise)
    ansible.builtin.shell:
      cmd: |
        ~/.local/bin/mise use -g navi
      executable: /bin/bash
    changed_when: false


  - name: Stow navi
    command: stow -v -t ~ -d {{ role_path }}/files -S . --no-folding
    register: navi_output
    changed_when: '"LINK" in navi_output.stderr'

  tags: navi
