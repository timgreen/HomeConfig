---
- block:
  - name: Stow cli_tools
    command: stow -v -t ~ -d {{ role_path }}/files -S . --no-folding
    register: cli_tools_output
    changed_when: '"LINK" in cli_tools_output.stderr'

  - name: Install cli tools
    package:
      name:
      - curl
      - wget
      - tree
      - ncdu
      - tldr
      - autossh
      - rclone
      - rsync
    become: true
    ignore_errors: true

  - name: Install cli tools (via mise)
    ansible.builtin.shell:
      cmd: |
        ~/.local/bin/mise use -g eza bat jq
      executable: /bin/bash
    changed_when: false

  tags:
  - cli_tools
