---
- block:
  - name: Ensure stow is installed
    ansible.builtin.package:
      name: stow
      state: present

  - name: Install gemini-cli via mise
    ansible.builtin.shell:
      cmd: |
        ~/.local/bin/mise use -g gemini-cli node
      executable: /bin/bash
    changed_when: false

  - name: Stow gemini_cli dotfiles
    ansible.builtin.command:
      cmd: stow -v -t ~ -d {{ role_path }}/files -S . --no-folding
    register: gemini_cli_output
    changed_when: '"LINK" in gemini_cli_output.stderr'
  tags:
    - gemini_cli
