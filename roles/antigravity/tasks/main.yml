---
- block:
  - name: Install antigravity-cli via official script
    ansible.builtin.shell:
      cmd: |
        set -o pipefail
        curl -fsSL https://antigravity.google/cli/install.sh | bash
      executable: /bin/bash
      creates: "{{ ansible_env.HOME }}/.local/bin/agy"
    environment:
      PATH: "{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH }}"

  - name: Stow antigravity dotfiles
    ansible.builtin.command:
      cmd: stow -v -t ~ -d {{ role_path }}/files -S . --no-folding
    register: antigravity_output
    changed_when: '"LINK" in antigravity_output.stderr'
  tags:
    - antigravity
